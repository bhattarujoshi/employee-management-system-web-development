<!-- ═══════════════════════════════════════
     WorkForce EMS — Dashboard Panel
     Include inside #content in index.html
     ═══════════════════════════════════════ -->

<div class="panel active" id="panel-dashboard">

  <!-- Stat Cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon" style="background:rgba(79,142,247,.15)">👥</div>
        <span class="stat-badge up">+4%</span>
      </div>
      <div class="stat-value" id="stat-total">15</div>
      <div class="stat-label">Total Employees</div>
    </div>

    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon" style="background:rgba(34,211,165,.15)">✅</div>
        <span class="stat-badge up">+2%</span>
      </div>
      <div class="stat-value">12</div>
      <div class="stat-label">Present Today</div>
    </div>

    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon" style="background:rgba(245,158,11,.15)">🌴</div>
        <span class="stat-badge down">-1</span>
      </div>
      <div class="stat-value">2</div>
      <div class="stat-label">On Leave</div>
    </div>

    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon" style="background:rgba(124,92,246,.15)">📋</div>
        <span class="stat-badge up">+3</span>
      </div>
      <div class="stat-value">3</div>
      <div class="stat-label">Pending Requests</div>
    </div>
  </div>

  <!-- Charts Row -->
  <div class="charts-row" style="display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-bottom:20px">
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Department Headcount</div>
          <div class="card-subtitle">Employees per department</div>
        </div>
      </div>
      <div class="bar-chart" id="dept-chart"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Employment Status</div>
      </div>
      <div class="donut-wrap">
        <svg width="140" height="140" viewBox="0 0 140 140" id="donut-svg"></svg>
        <div class="donut-legend" id="donut-legend"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Row -->
  <div class="dash-bottom" style="display:grid;grid-template-columns:1.5fr 1fr;gap:20px">
    <div class="card" style="margin-bottom:0">
      <div class="card-header">
        <div class="card-title">Recent Activity</div>
        <button class="btn btn-outline btn-sm"
          onclick="navigate('employees', document.querySelector('[onclick*=employees]'))">View All</button>
      </div>
      <div class="activity-list" id="activity-list"></div>
    </div>

    <div class="card" style="margin-bottom:0">
      <div class="card-header">
        <div class="card-title">Announcements</div>
        <button class="btn btn-outline btn-sm"
          onclick="navigate('announcements', document.querySelector('[onclick*=announcements]'))">All</button>
      </div>
      <div id="dash-ann"></div>
    </div>
  </div>

</div>
